const ChartCanvas = ({ config, height = 280 }) => {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, config);
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(config)]);
  return <div style={{ position: "relative", height }}><canvas ref={canvasRef} /></div>;
};

// =============== Password Gate ===============
const PASSWORD_HASH = "0b71f66110d10b875025dee395b5387cf6059985b09a3393add5aceb82e63c37";
const STORAGE_KEY = "novora_grass_unlocked";

async function sha256Hex(str) {
  const buf = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function Gate() {
  const [unlocked, setUnlocked] = useState(false);
  const [pw, setPw] = useState("");
  const [error, setError] = useState(false);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    try {
      if (sessionStorage.getItem(STORAGE_KEY) === "1") setUnlocked(true);
    } catch (e) { /* sessionStorage unavailable */ }
    setChecking(false);
  }, []);

  async function handleSubmit(e) {
    e.preventDefault();
    const hash = await sha256Hex(pw);
    if (hash === PASSWORD_HASH) {
      try { sessionStorage.setItem(STORAGE_KEY, "1"); } catch (e) {}
      setUnlocked(true);
      setError(false);
    } else {
      setError(true);
      setPw("");
    }
  }

  if (checking) return null;
  if (unlocked) return <App />;

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "#FAFAF9", fontFamily: "Helvetica Neue, Helvetica, Arial, sans-serif", padding: 24,
    }}>
      <div style={{ width: "100%", maxWidth: 420, textAlign: "center" }}>
        <div style={{ marginBottom: 32, display: "flex", justifyContent: "center" }}>
          <NovoraLockup />
        </div>
        <div style={{ fontSize: 11, letterSpacing: 1.5, color: PURPLE, textTransform: "uppercase", fontWeight: 600, marginBottom: 24 }}>
          Confidential · Restricted
        </div>
        <h1 style={{ fontSize: 28, fontWeight: 300, color: INK, margin: "0 0 12px" }}>Access required</h1>
        <p style={{ fontSize: 14, color: MUTED, lineHeight: 1.6, margin: "0 0 32px" }}>
          This research is shared by invitation. Enter the password provided to view.
        </p>
        <form onSubmit={handleSubmit}>
          <input
            type="password"
            value={pw}
            onChange={e => { setPw(e.target.value); setError(false); }}
            placeholder="Password"
            autoFocus
            style={{
              width: "100%", padding: "14px 16px", fontSize: 15, fontFamily: "inherit",
              background: "#fff",
              border: `1px solid ${error ? "#E5484D" : LIGHT}`,
              borderRadius: 8, marginBottom: 12, outline: "none",
              transition: "border-color 0.15s",
            }}
          />
          <button type="submit" style={{
            width: "100%", padding: "14px 16px", fontSize: 14, fontWeight: 600,
            color: "#fff", background: PURPLE, border: "none", borderRadius: 8,
            cursor: "pointer", fontFamily: "inherit",
          }}>Continue</button>
          <div style={{ minHeight: 20, marginTop: 12, fontSize: 12, color: error ? "#E5484D" : "transparent" }}>
            {error ? "Incorrect password. Try again." : " "}
          </div>
        </form>
        <div style={{ marginTop: 32, fontSize: 12, color: MUTED }}>
          Need access? Contact <a href="mailto:connor@novora.co" style={{ color: PURPLE, textDecoration: "none" }}>connor@novora.co</a>
        </div>
      </div>
    </div>
  );
}
