function ScoreArc({ score }) {
  const radius = 85;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score / 100) * circumference;
  return (
    <div style={{ position: 'relative', width: 220, height: 220 }}>
      <svg width="220" height="220">
        <circle cx="110" cy="110" r={radius} fill="none" stroke={COLORS.line} strokeWidth="14" />
        <circle
          cx="110" cy="110" r={radius} fill="none"
          stroke={COLORS.purple} strokeWidth="14"
          strokeDasharray={circumference} strokeDashoffset={offset}
          strokeLinecap="round" transform="rotate(-90 110 110)"
          style={{ transition: 'stroke-dashoffset 1.2s ease' }}
        />
      </svg>
      <div style={{ position: 'absolute', top: 0, left: 0, width: 220, height: 220, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
        <div style={{ fontSize: 56, fontWeight: 300, fontFamily: 'Helvetica Neue, sans-serif', color: COLORS.ink }}>{score}</div>
        <div style={{ fontSize: 12, color: COLORS.muted, letterSpacing: 1.5, textTransform: 'uppercase' }}>NIR Score</div>
        <div style={{ fontSize: 13, color: COLORS.purple, fontWeight: 500, marginTop: 4 }}>{TIER}</div>
      </div>
    </div>
  );
}

function FadeIn({ children, delay = 0 }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return <div style={{ opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(10px)', transition: 'all 0.5s ease' }}>{children}</div>;
}

function PillarRow({ pillar, expanded, onToggle }) {
  const grade = pillar.grade;
  const gradeColor = pillar.score >= 80 ? COLORS.green : pillar.score >= 65 ? COLORS.purple : pillar.score >= 50 ? COLORS.amber : COLORS.red;
  return (
    <div style={{ borderBottom: `1px solid ${COLORS.line}`, padding: '20px 0' }}>
      <div onClick={onToggle} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, flex: 1 }}>
          <div style={{ width: 44, height: 44, borderRadius: 6, background: gradeColor + '20', color: gradeColor, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 600, fontSize: 16 }}>{grade}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 500, color: COLORS.ink }}>{pillar.name}</div>
            <div style={{ fontSize: 13, color: COLORS.muted, marginTop: 2 }}>{pillar.score}/100</div>
          </div>
        </div>
        <div style={{ width: 200, height: 8, background: COLORS.line, borderRadius: 4, overflow: 'hidden' }}>
          <div style={{ width: `${pillar.score}%`, height: '100%', background: gradeColor, transition: 'width 1s ease' }} />
        </div>
        <div style={{ marginLeft: 16, color: COLORS.muted, fontSize: 14 }}>{expanded ? '−' : '+'}</div>
      </div>
      {expanded && (
        <FadeIn>
          <div style={{ marginTop: 16, paddingLeft: 60 }}>
            <p style={{ fontSize: 14, color: COLORS.muted, lineHeight: 1.6, marginBottom: 16 }}>{pillar.summary}</p>
            <div>
              {pillar.criteria.map((c, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', padding: '10px 0', borderBottom: `1px solid ${COLORS.line}` }}>
                  <div style={{ flex: 1, paddingRight: 16 }}>
                    <div style={{ fontSize: 13, color: COLORS.ink, marginBottom: 2 }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: COLORS.muted }}>{c.note}</div>
                  </div>
                  <div style={{ fontSize: 13, color: c.score >= c.max * 0.8 ? COLORS.green : c.score >= c.max * 0.5 ? COLORS.amber : COLORS.red, fontWeight: 500, minWidth: 60, textAlign: 'right' }}>{c.score}/{c.max}</div>
                </div>
              ))}
            </div>
          </div>
        </FadeIn>
      )}
    </div>
